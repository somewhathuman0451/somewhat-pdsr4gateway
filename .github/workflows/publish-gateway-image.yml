name: Publish Gateway Container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-gateway-image.yml"
      - "src/Somewhat.PdsR4Gateway/Dockerfile"
      - "src/Somewhat.PdsR4Gateway/**"
      - "tests/**"
      - "Somewhat.PdsR4Gateway.sln"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    permissions:
      contents: write
      id-token: write  # enable GitHub OIDC token issuance for this job
      packages: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          git fetch --tags --force

          next_patch_version() {
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
            if [[ -z "$latest_tag" ]]; then
              echo "0.1.0"
              return
            fi

            latest_version="${latest_tag#v}"
            if [[ ! "$latest_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "0.1.0"
              return
            fi

            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            echo "${major}.${minor}.$((patch + 1))"
          }

          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
            version="${tag#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              version="$(next_patch_version)"
            fi
          else
            version="$(next_patch_version)"
          fi

          if [[ -z "$version" ]]; then
            echo "Package version could not be determined."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gateway
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Somewhat.PdsR4Gateway/Dockerfile
          push: true
          cache-from: type=gha,scope=somewhat-pdsr4gateway
          cache-to: type=gha,mode=max,scope=somewhat-pdsr4gateway
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
      - name: Tag version after manual publish
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="v${version}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
